services:
  # Spring Boot Backend Web Service
  - type: web
    name: numberbuddies-backend
    plan: free
    runtime: docker
    rootDirectory: phase2-backend
    dockerfilePath: Dockerfile
    healthCheckPath: /api/v2/health

    envVars:
      # Database Connection (To be configured manually in Render Dashboard using a free managed database like Aiven)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # JPA / Schema Configuration
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate

      # JWT Configuration
      - key: JWT_SECRET
        value: dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWYyLWRpc2NhbGN1bGlhLWFwcC1iYWNrZW5k

      # CORS Origin (Points to Vercel production frontend)
      - key: CORS_ORIGINS
        value: https://frontend-phi-five-61.vercel.app

      # AI Module Toggle
      - key: AI_ENABLED
        value: "false"

      # JVM Memory Optimization for Render Free Tier (512MB RAM constraint)
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1 -Xss256k -XX:+UseSerialGC